apiVersion: apps/v1
kind: Deployment
metadata:
  name: fl-coordinator
  namespace: mohawk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fl-coordinator
  template:
    metadata:
      labels:
        app: fl-coordinator
    spec:
      containers:
        - name: fl
          image: mohawk/fl:local
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/fl/coordinator.py"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          readinessProbe:
            httpGet:
              path: /ready
              port: 9000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
