apiVersion: apps/v1
kind: Deployment
metadata:
  name: swip-client
  namespace: mohawk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swip-client
  template:
    metadata:
      labels:
        app: swip-client
    spec:
      containers:
        - name: swip
          image: mohawk/swip:local
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/swip/service.py"]
          ports:
            - containerPort: 9100
            - containerPort: 9101
          readinessProbe:
            httpGet:
              path: /ready
              port: 9100
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9100
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
