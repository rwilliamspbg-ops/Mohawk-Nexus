apiVersion: apps/v1
kind: Deployment
metadata:
  name: mohawk-control
  namespace: mohawk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mohawk-control
  template:
    metadata:
      labels:
        app: mohawk-control
    spec:
      containers:
        - name: control
          image: mohawk-control:ci
          command: ["/bin/sh", "-c"]
          args:
            - /usr/local/bin/mohawk-node --demo && sleep infinity
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
