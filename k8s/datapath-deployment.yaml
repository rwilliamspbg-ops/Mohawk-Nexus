apiVersion: apps/v1
kind: Deployment
metadata:
  name: mohawk-datapath
  namespace: mohawk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mohawk-datapath
  template:
    metadata:
      labels:
        app: mohawk-datapath
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: datapath
          image: mohawk-datapath:ci
          command: ["/usr/local/bin/mohawk-node-rust"]
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            privileged: true
