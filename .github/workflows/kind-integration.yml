name: kind-integration

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout SMIP-MWP repo
        uses: actions/checkout@v6
        with:
          repository: rwilliamspbg-ops/SMIP-MWP
          token: ${{ secrets.GITHUB_TOKEN }}
          path: SMIP-MWP
          fetch-depth: 0

      - name: Checkout SMIP-MWP-Rust repo
        uses: actions/checkout@v6
        with:
          repository: rwilliamspbg-ops/SMIP-MWP-Rust
          token: ${{ secrets.GITHUB_TOKEN }}
          path: SMIP-MWP-Rust
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'

      - name: Install kind
        run: |
          KIND_VERSION="v0.20.0"
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create kind cluster
        run: |
          kind create cluster --name mohawk-ci || true

      - name: Build control image
        run: |
          docker build -f images/SMIP-MWP/Dockerfile -t mohawk-control:ci .
          kind load docker-image --name mohawk-ci mohawk-control:ci

      - name: Build datapath image
        run: |
          docker build -f images/SMIP-MWP-Rust/Dockerfile -t mohawk-datapath:ci .
          kind load docker-image --name mohawk-ci mohawk-datapath:ci

      - name: Build FL image
        run: |
          docker build -f images/fl/Dockerfile -t mohawk/fl:local .
          kind load docker-image --name mohawk-ci mohawk/fl:local

      - name: Build SWIP image
        run: |
          docker build -f images/swip/Dockerfile -t mohawk/swip:local .
          kind load docker-image --name mohawk-ci mohawk/swip:local

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Apply k8s manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/networkpolicy.yaml
          kubectl apply -f k8s/control-deployment.yaml
          kubectl apply -f k8s/datapath-deployment.yaml
          kubectl apply -f k8s/fl-deployment.yaml
          kubectl apply -f k8s/swip-deployment.yaml

      - name: Wait for required deployments
        run: |
          set -euo pipefail

          wait_required() {
            local dep="$1"
            echo "Waiting for required deployment: ${dep}"
            if ! kubectl rollout status "deployment/${dep}" -n mohawk --timeout=240s; then
              echo "Required deployment failed: ${dep}"
              kubectl get pods -n mohawk -o wide || true
              kubectl describe "deployment/${dep}" -n mohawk || true
              kubectl get events -n mohawk --sort-by=.lastTimestamp | tail -n 200 || true
              kubectl logs -n mohawk "deployment/${dep}" --all-containers --tail=200 || true
              exit 1
            fi
          }

          wait_optional() {
            local dep="$1"
            echo "Waiting for optional deployment: ${dep}"
            if ! kubectl rollout status "deployment/${dep}" -n mohawk --timeout=180s; then
              echo "Optional deployment not available in kind profile: ${dep}"
              kubectl describe "deployment/${dep}" -n mohawk || true
              kubectl logs -n mohawk "deployment/${dep}" --all-containers --tail=200 || true
            fi
          }

          # FL and SWIP are expected to be healthy in portable kind integration runs.
          wait_required fl-coordinator
          wait_required swip-client

          # Control and datapath may depend on host capabilities not present in kind.
          wait_optional mohawk-control
          wait_optional mohawk-datapath

      - name: Dump namespace diagnostics on failure
        if: failure()
        run: |
          kubectl get all -n mohawk -o wide || true
          kubectl get events -n mohawk --sort-by=.lastTimestamp | tail -n 200 || true

      - name: Run workspace verify
        run: make verify || true

      - name: Upload benchmarks and logs
        uses: actions/upload-artifact@v7
        with:
          name: integration-artifacts
          path: |
            SMIP-MWP/benchmarks/**
            SMIP-MWP/benchmarks/ci-short-stress/**
          retention-days: 7
