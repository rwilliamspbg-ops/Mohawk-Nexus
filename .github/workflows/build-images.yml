name: build-images

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout SMIP-MWP repo
        uses: actions/checkout@v6
        with:
          repository: rwilliamspbg-ops/SMIP-MWP
          token: ${{ secrets.GITHUB_TOKEN }}
          path: SMIP-MWP
          fetch-depth: 0

      - name: Checkout SMIP-MWP-Rust repo
        uses: actions/checkout@v6
        with:
          repository: rwilliamspbg-ops/SMIP-MWP-Rust
          token: ${{ secrets.GITHUB_TOKEN }}
          path: SMIP-MWP-Rust
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build control image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/SMIP-MWP/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false

      - name: Build datapath image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/SMIP-MWP-Rust/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false

      - name: Build FL image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/fl/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false

      - name: Build SWIP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/swip/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
