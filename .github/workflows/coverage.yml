name: coverage

on:
  push:
  pull_request:

jobs:
  go-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Run Go tests with coverage
        env:
          GOWORK: off
        run: |
          go test ./... -covermode=atomic -coverprofile=coverage-go.out
          go tool cover -func=coverage-go.out | tee coverage-go.txt

      - name: Upload Go coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: |
            sdk/go/coverage-go.out
            sdk/go/coverage-go.txt

  rust-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/rust
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run Rust tests with coverage
        run: |
          cargo llvm-cov --all-features --all-targets --lcov --output-path coverage-rust.lcov
          cargo llvm-cov --all-features --all-targets --summary-only | tee coverage-rust.txt

      - name: Upload Rust coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rust-coverage
          path: |
            sdk/rust/coverage-rust.lcov
            sdk/rust/coverage-rust.txt
