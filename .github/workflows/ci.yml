name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run workspace verify
        run: make verify
