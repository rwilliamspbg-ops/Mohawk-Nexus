name: ci

on:
  push:
  pull_request:

jobs:
  portability:
    name: portability-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Python unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Validate bridge contract
        run: |
          python scripts/generate_bridge_contract.py
          python scripts/generate_bridge_bindings.py
          python scripts/validate_bridge_contract.py
          git diff --exit-code -- bridge/ sdk/go/mohawksdk/bridge_contract.go sdk/rust/src/bridge_contract.rs sdk/python/mohawk_sdk/bridge_contract.py sdk/typescript/src/bridgeContract.js

  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout SMIP-MWP
        uses: actions/checkout@v4
        with:
          repository: rwilliamspbg-ops/SMIP-MWP
          path: SMIP-MWP

      - name: Checkout Sovereign-Mohawk-Proto
        uses: actions/checkout@v4
        with:
          repository: rwilliamspbg-ops/Sovereign-Mohawk-Proto
          path: Sovereign-Mohawk-Proto

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Ensure Python 3 is available
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-venv python3-pip

      - name: Run workspace verify
        run: make verify

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: workspace-benchmarks
          path: |
            SMIP-MWP/benchmarks/**
            SMIP-MWP/benchmarks/ci-short-stress/**
          retention-days: 7

  sdk-python-conformance:
    name: sdk-python-conformance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Python SDK conformance tests
        run: |
          PYTHONPATH=sdk/python python -m unittest discover -s sdk/python/tests -p 'test_*.py' -v

  sdk-go-conformance:
    name: sdk-go-conformance-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Go SDK conformance tests
        working-directory: sdk/go
        env:
          GOWORK: off
        run: go test ./... -v

  sdk-rust-conformance:
    name: sdk-rust-conformance-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Rust SDK conformance tests
        run: |
          cd sdk/rust
          cargo test --all-targets --all-features

  sdk-typescript-conformance:
    name: sdk-typescript-conformance-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run TypeScript SDK conformance tests
        run: |
          cd sdk/typescript
          npm test

  rust-security-audit:
    name: rust-security-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        env:
          CARGO_NET_RETRY: 10
          CARGO_HTTP_TIMEOUT: 120
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
        run: |
          for attempt in 1 2 3; do
            cargo install cargo-audit --locked && break
            if [[ "$attempt" -eq 3 ]]; then
              echo "cargo-audit install failed after 3 attempts"
              exit 1
            fi
            echo "Retrying cargo-audit install (attempt $((attempt + 1))/3)"
            sleep 10
          done

      - name: Run cargo audit on Rust SDK
        working-directory: sdk/rust
        env:
          CARGO_NET_RETRY: 10
          CARGO_HTTP_TIMEOUT: 120
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
        run: cargo audit
