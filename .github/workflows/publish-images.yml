name: publish-images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout SMIP-MWP repo
        uses: actions/checkout@v4
        with:
          repository: rwilliamspbg-ops/SMIP-MWP
          token: ${{ secrets.GITHUB_TOKEN }}
          path: SMIP-MWP
          fetch-depth: 0

      - name: Checkout SMIP-MWP-Rust repo
        uses: actions/checkout@v4
        with:
          repository: rwilliamspbg-ops/SMIP-MWP-Rust
          token: ${{ secrets.GITHUB_TOKEN }}
          path: SMIP-MWP-Rust
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push control image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/SMIP-MWP/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/rwilliamspbg-ops/mohawk-control:latest
            ghcr.io/rwilliamspbg-ops/mohawk-control:${{ github.sha }}

      - name: Build and push datapath image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/SMIP-MWP-Rust/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/rwilliamspbg-ops/mohawk-datapath:latest
            ghcr.io/rwilliamspbg-ops/mohawk-datapath:${{ github.sha }}

      - name: Build and push FL image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/fl/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/rwilliamspbg-ops/mohawk-fl:latest
            ghcr.io/rwilliamspbg-ops/mohawk-fl:${{ github.sha }}

      - name: Build and push SWIP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/swip/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/rwilliamspbg-ops/mohawk-swip:latest
            ghcr.io/rwilliamspbg-ops/mohawk-swip:${{ github.sha }}
